.brand-sub {

.header-actions { display: flex; gap: 10px; align-items: center; }
.btn-print {
background: rgba(255,255,255,0.08);

color: rgba(255,255,255,0.75);

border-radius: 8px;
font-size: 12px;
font-weight: 500;
cursor: pointer;
transition: all 0.2s;
}
.btn-print:hover { background: rgba(255,255,255,0.15); color: #fff; }

/* ── MONTH NAVIGATION ── */
.month-nav {
background: #162e4a;
border-bottom: 1px solid rgba(255,255,255,0.05);
padding: 10px 20px;
overflow-x: auto;
scrollbar-width: none;
}
.month-nav::-webkit-scrollbar { display: none; }
.month-tabs {
display: flex;
gap: 4px;
min-width: max-content;
}
.month-tab {
padding: 7px 16px;
border-radius: 20px;
font-size: 12.5px;
font-weight: 500;
cursor: pointer;
white-space: nowrap;
border: none;
background: transparent;
color: rgba(255,255,255,0.45);
transition: all 0.2s;
letter-spacing: 0.3px;
}
.month-tab:hover { color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.06); }
.month-tab.active { background: rgba(255,255,255,0.12); color: #fff; font-weight: 600; }

/* ── MONTH PAGE ── */
.month-page { display: none; padding: 24px 20px; max-width: 1100px; margin: 0 auto; }
.month-page.active { display: block; }

.month-card {

}

display: flex;
flex-direction: column;
justify-content: flex-end;
}
.month-bg-text {

font-size: 130px;
font-weight: 900;
opacity: 0.08;
position: absolute;
bottom: -18px;
left: 24px;
line-height: 1;
pointer-events: none;
user-select: none;
white-space: nowrap;
}
.month-eyebrow {
font-size: 11px;
font-weight: 700;
letter-spacing: 3px;
text-transform: uppercase;
opacity: 0.5;
margin-bottom: 4px;
}
.month-title-row {
display: flex;
align-items: flex-end;
gap: 12px;
}
.month-name {
font-family: 'Playfair Display', serif;
font-size: 52px;
font-weight: 900;
line-height: 1;
}
.month-year-badge {
font-size: 22px;
font-weight: 700;
opacity: 0.5;
padding-bottom: 6px;
font-family: 'Playfair Display', serif;
}
.awareness-tags {
margin-top: 14px;
display: flex;
flex-wrap: wrap;
gap: 6px;
}
.awareness-tag {
display: inline-flex;
align-items: center;
gap: 5px;
padding: 4px 10px;
border-radius: 20px;
font-size: 11px;
font-weight: 600;
background: rgba(255,255,255,0.15);
letter-spacing: 0.3px;
}

/* ── KEY DATES SIDEBAR ── */

display: grid;
grid-template-columns: 1fr 280px;
gap: 0;
}

.calendar-section { padding: 20px 24px 28px; }
.sidebar { padding: 20px 20px 28px; border-left: 1px solid rgba(255,255,255,0.07); }

.sidebar-section { margin-bottom: 20px; }
.sidebar-heading {

font-weight: 700;
letter-spacing: 2px;
text-transform: uppercase;
opacity: 0.4;
margin-bottom: 10px;
}

align-items: flex-start;
gap: 8px;
margin-bottom: 8px;
padding: 8px 10px;
border-radius: 8px;

.company-event-date { font-weight: 700; white-space: nowrap; opacity: 0.9; min-width: 50px; }
.company-event-name { opacity: 0.8; line-height: 1.4; }
.no-events { font-size: 12px; opacity: 0.3; font-style: italic; padding: 6px 0; }

gap: 7px;
margin-bottom: 7px;
font-size: 11.5px;
line-height: 1.4;
}
.holiday-emoji { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
.holiday-info {}
.holiday-name { font-weight: 500; opacity: 0.9; }
.holiday-date-label { font-size: 10.5px; opacity: 0.5; font-weight: 600; }
.holiday-countries {
display: inline-flex;
gap: 3px;
margin-left: 4px;
}
.country-chip {
font-size: 9px;
padding: 1px 4px;
border-radius: 3px;
font-weight: 700;
letter-spacing: 0.3px;

.chip-US { background: rgba(59,130,246,0.3); color: #93c5fd; }
.chip-CA { background: rgba(239,68,68,0.3); color: #fca5a5; }
.chip-UK { background: rgba(139,92,246,0.3); color: #c4b5fd; }

.chip-IL { background: rgba(6,182,212,0.3); color: #67e8f9; }

display: inline-block;
font-size: 9px;
padding: 1px 5px;
border-radius: 3px;
font-weight: 700;
background: rgba(248,113,113,0.25);
color: #fca5a5;
margin-left: 4px;
}

/* ── CALENDAR GRID ── */
.day-headers {
display: grid;
grid-template-columns: repeat(7, 1fr);
gap: 3px;
margin-bottom: 4px;
}
.day-header-cell {
text-align: center;
font-size: 10px;
font-weight: 700;
letter-spacing: 1.5px;
text-transform: uppercase;
opacity: 0.35;
padding: 4px 0;
}

.cal-grid {
display: grid;
grid-template-columns: repeat(7, 1fr);
gap: 3px;
}
.cal-cell {
min-height: 76px;
padding: 6px 7px;
border-radius: 8px;
background: rgba(255,255,255,0.04);
transition: background 0.15s;
position: relative;
}
.cal-cell:hover { background: rgba(255,255,255,0.08); }
.cal-cell.empty { background: transparent; }
.cal-cell.today {
background: rgba(255,255,255,0.12) !important;
box-shadow: inset 0 0 0 1.5px rgba(255,255,255,0.3);
}
.cal-day-num {
font-size: 14px;
font-weight: 600;
opacity: 0.85;
line-height: 1;
margin-bottom: 4px;
}
.cal-cell.today .cal-day-num {
display: inline-flex;
align-items: center;
justify-content: center;
width: 24px;
height: 24px;
background: rgba(255,255,255,0.9);
color: #000;
border-radius: 50%;
font-size: 12px;
font-weight: 700;
}

font-size: 9.5px;

line-height: 1.35;

.month-page { display: block !important; padding: 0; page-break-after: always; }
.month-card { box-shadow: none; border: 1px solid #ddd; }
.month-page:last-child { page-break-after: avoid; }
}

// ── HELPERS ──────────────────────────────────────────────────────
function pad(n){ return String(n).padStart(2,'0'); }
function dateKey(y,m,d){ return `${y}-${pad(m)}-${pad(d)}`; }

function getHolidaysForMonth(y,m){
const out = {};
Object.entries(HOLIDAYS).forEach(([k,v])=>{
const [ky,km,kd] = k.split('-').map(Number);
if(ky===y && km===m) out[kd] = (out[kd]||[]).concat(v);
});
return out;
}

function getCompanyForMonth(y,m){
const out = {};
Object.entries(COMPANY_EVENTS).forEach(([k,v])=>{
const [ky,km,kd] = k.split('-').map(Number);
if(ky===y && km===m) out[kd] = (out[kd]||[]).concat(v);
});
return out;
}

function countryChips(countries){
return countries.map(c=>{
const cc = COUNTRY_CONF[c];
return cc ? `<span class="country-chip ${cc.cls}">${cc.flag} ${cc.label}</span>` : '';
}).join('');
}

// ── BUILD SIDEBAR ─────────────────────────────────────────────────
function buildSidebar(y, m, holidays, company){
// Company events
let compHTML = '';
const compEntries = Object.entries(company).sort((a,b)=>Number(a[0])-Number(b[0]));
if(compEntries.length === 0){
compHTML = `<div class="no-events">No company events added yet.<br>Edit COMPANY_EVENTS in the HTML to add.</div>`;
} else {
compEntries.forEach(([d, evts])=>{
evts.forEach(e=>{
const dateLabel = new Date(y, m-1, Number(d)).toLocaleDateString('en-US',{month:'short', day:'numeric'});
compHTML += `<div class="company-event-item ${e.type||'company'}">
<div class="company-event-date">${dateLabel}</div>
<div class="company-event-name">${e.name}${e.note?` <span style="opacity:0.5;font-size:10px">— ${e.note}</span>`:''}${e.countries?`<div style="margin-top:3px;">${countryChips(e.countries)}</div>`:''}</div>
</div>`;
});
});
}

// Holidays list
let holHTML = '';
const holEntries = Object.entries(holidays).sort((a,b)=>Number(a[0])-Number(b[0]));
holEntries.forEach(([d, evts])=>{
evts.forEach(e=>{
const dateLabel = new Date(y, m-1, Number(d)).toLocaleDateString('en-US',{month:'short', day:'numeric'});
holHTML += `<div class="holiday-item">
<div class="holiday-emoji">${e.emoji||'📅'}</div>
<div class="holiday-info">
<span class="holiday-date-label">${dateLabel}</span>

</div>

});
});
if(!holHTML) holHTML = `<div class="no-events">No holidays this month.</div>`;

return `

<div class="sidebar-section">
<div class="sidebar-heading">🏢 Company Events</div>
${compHTML}
</div>
<div class="sidebar-section">

${holHTML}
</div>

}

// ── BUILD CALENDAR GRID ───────────────────────────────────────────
function buildCalGrid(y, m, holidays, company){
const firstDow = new Date(y, m-1, 1).getDay(); // 0=Sun
const daysInMonth = new Date(y, m, 0).getDate();
const todayY = TODAY.getFullYear(), todayM = TODAY.getMonth()+1, todayD = TODAY.getDate();

let html = '<div class="day-headers">';
DAY_LABELS.forEach(d=> html += `<div class="day-header-cell">${d}</div>`);
html += '</div><div class="cal-grid">';

// Empty cells before first day
for(let i=0; i<firstDow; i++) html += '<div class="cal-cell empty"></div>';

for(let d=1; d<=daysInMonth; d++){
const isToday = (y===todayY && m===todayM && d===todayD);
html += `<div class="cal-cell${isToday?' today':''}">`;
html += `<div class="cal-day-num">${d}</div>`;

// Company events first
(company[d]||[]).forEach(e=>{
const t = e.type||'company';
html += `<div class="cal-event evt-${t}">
<span class="cal-event-emoji">${t==='townhall'?'🎤':t==='closed'?'🔴':t==='conference'?'🏆':'📌'}</span>
<span class="cal-event-text">${e.name}</span>
</div>`;
});

// Holidays
(holidays[d]||[]).forEach(e=>{
const flags = (e.countries||[]).map(c=> COUNTRY_CONF[c]?COUNTRY_CONF[c].flag:'').join('');
const plainName = e.name.replace(/<[^>]*>/g, '');
html += `<div class="cal-event evt-${e.type||'public'}" title="${plainName}${e.note?' — '+e.note:''}">
<span class="cal-event-emoji">${e.emoji||'📅'}</span>
<span class="cal-event-text">${e.name} <span style="font-size:8px;opacity:0.6">${flags}</span></span>
</div>`;
});

html += '</div>';
}

// Fill remaining cells
const totalCells = firstDow + daysInMonth;
const remainder = totalCells % 7;
if(remainder !== 0){
for(let i=remainder; i<7; i++) html += '<div class="cal-cell empty"></div>';
}

html += '</div>';
return html;
}

// ── RENDER APP ────────────────────────────────────────────────────
function renderApp(){
const root = document.getElementById('calendarRoot');
const tabs = document.getElementById('monthTabs');

// Current month is the default
const currentM = (TODAY.getFullYear()===YEAR) ? TODAY.getMonth()+1 : 1;

MONTHS.forEach(cfg => {
// Tab
const tab = document.createElement('button');
tab.className = 'month-tab' + (cfg.n===currentM ? ' active' : '');
tab.textContent = cfg.name.slice(0,3).toUpperCase();
tab.dataset.month = cfg.n;
tab.addEventListener('click', ()=> switchMonth(cfg.n));
tabs.appendChild(tab);

// Page
root.insertAdjacentHTML('beforeend', buildMonthPage(cfg));
});

// Activate default month
const activePage = document.getElementById(`month-${currentM}`);
if(activePage) activePage.classList.add('active');

// Scroll tab into view
setTimeout(()=>{
const activeTab = tabs.querySelector('.active');
if(activeTab) activeTab.scrollIntoView({ inline:'center', block:'nearest' });
}, 50);
}

function switchMonth(n){
document.querySelectorAll('.month-page').forEach(p=> p.classList.remove('active'));
document.querySelectorAll('.month-tab').forEach(t=> t.classList.remove('active'));
const page = document.getElementById(`month-${n}`);
if(page) page.classList.add('active');
const tab = document.querySelector(`.month-tab[data-month="${n}"]`);
if(tab){
tab.classList.add('active');
tab.scrollIntoView({ inline:'center', block:'nearest', behavior:'smooth' });
}
window.scrollTo({ top:0, behavior:'smooth' });
}

renderApp();
</script>
